version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: braincheck-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${SCHEMA:-braincheck}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./Server/init-db:/docker-entrypoint-initdb.d
    networks:
      - braincheck-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Server
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: braincheck-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      DB_TYPE: mysql
      SCHEMA: ${SCHEMA:-braincheck}
      API_KEY: ${API_KEY}
      MailKey: ${MailKey}
      MailHOST: ${MailHOST}
      MailPORT: ${MailPORT}
      MailUSER: ${MailUSER}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - braincheck-network
    volumes:
      - ./Server:/app
      - /app/node_modules

  # Frontend UI
  ui:
    build:
      context: ./UI
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
    container_name: braincheck-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - braincheck-network

networks:
  braincheck-network:
    driver: bridge

volumes:
  db-data:
    driver: local
