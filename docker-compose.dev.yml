version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: braincheck-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${SCHEMA:-braincheck}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./Server/init-db:/docker-entrypoint-initdb.d
    networks:
      - braincheck-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Server (Development with hot-reload)
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: braincheck-server-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8888
      DB_HOST: db
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      DB_TYPE: mysql
      SCHEMA: ${SCHEMA:-braincheck}
      API_KEY: ${API_KEY}
      MailKey: ${MailKey}
      MailHOST: ${MailHOST}
      MailPORT: ${MailPORT}
      MailUSER: ${MailUSER}
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - braincheck-network
    volumes:
      # Mount source code for hot-reload
      - ./Server:/app
      # Named volume for node_modules (prevents overwrite)
      - server-node-modules:/app/node_modules
    command: npm start

  # Frontend UI (Development with hot-reload)
  ui-dev:
    build:
      context: ./UI
      dockerfile: Dockerfile.dev
    container_name: braincheck-ui-dev
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8888
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - braincheck-network
    volumes:
      # Mount source code for hot-reload
      - ./UI:/app
      # Named volume for node_modules
      - ui-node-modules:/app/node_modules
    command: npm start

networks:
  braincheck-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  server-node-modules:
  ui-node-modules:
